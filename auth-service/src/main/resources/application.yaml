spring:
  application:
    name: auth-service
  security:
    user:
      name: ${SPRING_SECURITY_USER:admin}
      password: ${SPRING_SECURITY_PASS:admin}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}
    username: ${DB_USERNAME:yixupi}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

jwt:
  secret: ${JWT_SECRET:change-me-dev-jwt-secret-that-is-at-least-32-bytes-long}
  expiration: ${JWT_EXPIRATION:3600000}

aws:
  region: ${AWS_REGION:us-west-1}
  s3:
    bucket: ${AWS_S3_BUCKET:trustplatform-uploads-1}
