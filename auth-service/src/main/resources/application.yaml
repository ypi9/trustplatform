spring:
  application:
    name: auth-service
  security:
    user:
      name: ${SPRING_SECURITY_USER:admin}
      password: ${SPRING_SECURITY_PASS:admin}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}
    username: ${DB_USERNAME:yixupi}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

jwt:
  secret: ${JWT_SECRET:m3F8kP2xR7vQ9wL5tY1nJ6hB4dA0sG8cU3eI7oK2pN5rT9yW1xZ4bV6fH0jM3qE}
  expiration: ${JWT_EXPIRATION:3600000}

aws:
  region: ${AWS_REGION:us-west-1}
  s3:
    bucket: ${AWS_S3_BUCKET:trustplatform-uploads-1}